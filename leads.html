<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Leads · Reception</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23171512'/%3E%3Csvg x='5.5' y='5.5' width='21' height='21' viewBox='0 0 64 64'%3E%3Crect x='9' y='45.5' width='46' height='5.8' rx='2.9' fill='%23f3efe8'/%3E%3Cpath d='M15.5 45.5 a16.5 15.5 0 0 1 33 0 Z' fill='%23f3efe8'/%3E%3Ccircle cx='32' cy='26.5' r='3.9' fill='%23e8663a'/%3E%3C/svg%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f3efe8;--card:#fbf8f1;--surface:#ece3d4;--ink:#171512;--muted:#635b4f;--accent:#e8663a;--accent-ink:#b24714;--line:rgba(23,21,18,.13);--font:"Bricolage Grotesque",system-ui,sans-serif;--mono:"Spline Sans Mono",monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  [hidden]{display:none!important}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;padding:0 0 80px}
  .wrap{max-width:760px;margin:0 auto;padding:0 clamp(14px,4vw,30px)}
  a{color:inherit}
  /* shared console sub-nav */
  .tbar{position:sticky;top:0;z-index:50;background:rgba(243,239,232,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-bottom:20px}
  .tbar-in{max-width:1080px;margin:0 auto;padding:10px clamp(14px,4vw,28px);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .brand{display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:-.02em;color:var(--ink);min-height:34px}
  .brand svg{width:25px;height:25px;flex:none}
  .brand .csl{color:var(--muted);font-weight:600}
  .sntabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:4px}
  .sntabs a{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;padding:6px 13px;border-radius:100px;transition:background .15s,color .15s;cursor:pointer;white-space:nowrap}
  .sntabs a:hover{color:var(--ink)}
  .sntabs a.on{background:var(--accent-ink);color:#fff}
  .tbar-in>.brand{justify-self:start}.tbar-in>.sntabs{justify-self:center}.tbar-in>.tbar-actions{justify-self:end}
  @media(max-width:680px){.tbar-in{display:flex;flex-wrap:wrap}.sntabs{order:3;flex-basis:100%;margin:9px 0 0;justify-content:center;flex-wrap:wrap;gap:4px}.tbar-actions{margin-left:auto}}
  @media(max-width:600px){.brand .csl{display:none}.tbar-in{gap:9px}.sntabs a{padding:6px 13px}}
  h1{font-size:clamp(24px,5vw,31px);font-weight:800;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:15px;margin-top:4px}
  .filterrow{display:flex;gap:6px;margin-top:16px}
  .fpill{font-family:var(--mono);font-size:12px;letter-spacing:.02em;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:100px;padding:7px 14px;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .fpill b{color:inherit;font-weight:700}
  .fpill:hover{border-color:var(--accent-ink)}
  .fpill.on{background:var(--accent-ink);color:#fff;border-color:var(--accent-ink)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:4px 18px;margin-top:16px}
  .lead{padding:16px 0;border-top:1px solid var(--line)}
  .lead:first-child{border-top:none}
  .lead .who{font-weight:700;font-size:16px}
  .lead .who .contact{color:var(--accent-ink);font-weight:700}
  .lead .meta{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:3px}
  .lead .intent{color:var(--ink);font-size:14px;margin-top:7px;line-height:1.5}
  .lead.done{opacity:.55}
  .lead.done .who{text-decoration:line-through;text-decoration-color:rgba(23,21,18,.3)}
  .lead .undel{display:inline-block;margin-top:9px;font-size:11.5px;font-weight:600;color:#8a3a1a;background:#f6e3d8;border-radius:6px;padding:3px 9px}
  .acts{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px}
  .act{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-size:13px;font-weight:600;text-decoration:none;border-radius:100px;padding:8px 14px;cursor:pointer;border:none}
  .act svg{width:15px;height:15px}
  .act.wa{background:#25a75a;color:#fff}
  .act.wa:hover{background:#1f9350}
  .act.tel,.act.mail{background:rgba(232,102,58,.13);color:var(--accent-ink);border:1px solid rgba(178,71,20,.3)}
  .act.tel:hover,.act.mail:hover{background:rgba(232,102,58,.22)}
  .spacer{flex:1}
  .lead .mk,.lead .del{font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 2px;text-transform:uppercase;letter-spacing:.04em}
  .lead .mk{color:var(--accent-ink)}
  .lead .del:hover{color:#b3261e}
  .center{text-align:center;color:var(--muted);padding:40px 10px}
  .empty{color:var(--muted);font-size:14.5px;padding:26px 4px;text-align:center;line-height:1.5}
  #app{display:none}
  @media(max-width:520px){ .spacer{flex-basis:100%;height:0} }
</style>
</head>
<body>
<header class="tbar">
  <div class="tbar-in">
    <div class="brand"><svg viewBox="0 0 64 64" aria-hidden="true"><rect x="9" y="45.5" width="46" height="5.8" rx="2.9" fill="#171512"/><path d="M15.5 45.5 a16.5 15.5 0 0 1 33 0 Z" fill="#171512"/><circle cx="32" cy="26.5" r="3.9" fill="#e8663a"/></svg>Reception <span class="csl">Console</span></div>
    <nav class="sntabs">
      <a id="tabFd" href="#">Front desk</a>
      <a id="tabAp" href="#">Appearance</a>
      <a id="tabBk" href="#">Bookings</a>
      <a id="tabLd" href="#" class="on">Leads</a>
      <a id="tabAn" href="#">Analytics</a>
    </nav>
  </div>
</header>
<div class="wrap">
  <div id="loading" class="center">Loading…</div>
  <div id="loaderr" class="center" hidden style="color:#b3261e"><span id="loaderrmsg"></span></div>

  <div id="app">
    <h1>Leads</h1>
    <div class="sub" id="bizname"></div>
    <div class="filterrow" id="filterrow" hidden>
      <button class="fpill on" id="fNew" data-f="new"><b id="cNew">0</b> new</button>
      <button class="fpill" id="fAll" data-f="all"><b id="cTotal">0</b> total</button>
    </div>

    <div class="card"><div id="leads"><div class="empty">Loading…</div></div></div>
    <div class="sub" style="margin-top:14px;font-size:13px">Enquiries and bookings that left contact details. Each one is also sent to your Telegram the moment it comes in.</div>
  </div>
</div>

<script>
  const WORKER="https://nimbus-desk.propsightsg.workers.dev", BASE=location.origin+location.pathname.replace(/\/[^/]*$/,"");
  const $=id=>document.getElementById(id);
  const P=new URLSearchParams(location.search), slug=P.get("c")||"", key=P.get("k")||"";
  let ALL=[], filter="new", bizName="";
  function eh(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
  async function api(path,body){try{const r=await fetch(WORKER+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});return{status:r.status,data:await r.json().catch(()=>({}))};}catch(e){return{status:0,data:{}};}}
  function ftime(s){if(!s)return"";try{const d=new Date(String(s).replace(" ","T")+"Z");return d.toLocaleDateString("en-SG",{weekday:"short",day:"numeric",month:"short",timeZone:"Asia/Singapore"})+", "+d.toLocaleTimeString("en-SG",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:"Asia/Singapore"});}catch(e){return"";}}
  // one-tap contact links to the CUSTOMER
  function waHref(contact,name){
    const digits=String(contact||"").replace(/\D/g,""); if(digits.length<8) return null;
    const num=(digits.length===8&&/^[89]/.test(digits))?("65"+digits):digits;
    const msg="Hi "+(name&&name!=="Someone"?name:"there")+", thanks for your enquiry with "+bizName+"! ";
    return "https://wa.me/"+num+"?text="+encodeURIComponent(msg);
  }

  function render(){
    const el=$("leads");
    const list=filter==="new"?ALL.filter(l=>l.status!=="done"):ALL;
    if(!ALL.length){ el.innerHTML='<div class="empty">No leads yet. They\'ll show here the moment a customer leaves their name and number.</div>'; return; }
    if(!list.length){ el.innerHTML='<div class="empty">No new leads right now. Tap "total" to see the handled ones.</div>'; return; }
    el.innerHTML="";
    list.forEach(l=>{
      const d=document.createElement("div"); d.className="lead"+(l.status==="done"?" done":"");
      const c=String(l.contact||"").trim(); const isEmail=/@/.test(c);
      const contactDisp=eh(c);
      const wa=isEmail?null:waHref(c,l.name);
      const tel=isEmail?null:(/\d/.test(c)?"tel:"+c.replace(/[^\d+]/g,""):null);
      const mail=isEmail?"mailto:"+c:null;
      let acts='';
      if(wa) acts+='<a class="act wa" href="'+wa+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.7 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 0 1-3.2-2.8c-.2-.4.2-.4.6-1.2.1-.1 0-.3 0-.4l-.7-1.7c-.2-.5-.4-.4-.6-.4h-.5a1 1 0 0 0-.7.3c-.2.3-.9.9-.9 2.1s.9 2.5 1 2.6c.1.2 1.8 2.9 4.5 4 1.7.7 2.3.8 3.1.7.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1z"/></svg>WhatsApp</a>';
      if(tel) acts+='<a class="act tel" href="'+tel+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg>Call</a>';
      if(mail) acts+='<a class="act mail" href="'+mail+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>Email</a>';
      d.innerHTML='<div class="who">'+eh(l.name||"Someone")+' &middot; <span class="contact">'+contactDisp+'</span></div>'+
        '<div class="meta">'+ftime(l.created_at)+'</div>'+
        (l.intent?'<div class="intent">'+eh(l.intent)+'</div>':'')+
        ((l.delivered===0||l.delivered==="0")?'<div class="undel">Saved here, but not sent to your Telegram. Connect it in the console.</div>':'')+
        '<div class="acts">'+acts+'<span class="spacer"></span>'+
        '<button class="mk" data-id="'+l.id+'" data-st="'+(l.status==="done"?"new":"done")+'">'+(l.status==="done"?"mark as new":"mark handled")+'</button>'+
        '<button class="del" data-del="'+l.id+'">delete</button></div>';
      el.appendChild(d);
    });
  }

  async function load(){
    const {status,data}=await api("/admin/leads",{c:slug,k:key});
    if(status!==200){ $("leads").innerHTML='<div class="empty" style="color:#b3261e">Couldn\'t load leads. <a href="#" onclick="load();return false" style="color:var(--accent-ink)">Retry</a></div>'; return; }
    ALL=data.leads||[];
    $("filterrow").hidden=false;
    $("cTotal").textContent=ALL.length;
    $("cNew").textContent=ALL.filter(l=>l.status!=="done").length;
    render();
  }

  document.querySelectorAll(".fpill").forEach(b=>b.addEventListener("click",()=>{
    filter=b.dataset.f; document.querySelectorAll(".fpill").forEach(x=>x.classList.toggle("on",x===b)); render();
  }));
  $("leads").addEventListener("click",async e=>{
    const del=e.target.closest(".del");
    if(del){ if(!confirm("Delete this lead? This can't be undone.")) return; del.disabled=true; del.textContent="Deleting…"; await api("/admin/lead-delete",{c:slug,k:key,id:Number(del.dataset.del)}); load(); return; }
    const b=e.target.closest(".mk"); if(!b)return; b.disabled=true; await api("/admin/lead-status",{c:slug,k:key,id:Number(b.dataset.id),status:b.dataset.st}); load();
  });

  (async function(){
    if(!slug||!key){ $("loading").hidden=true; $("loaderr").hidden=false; $("loaderrmsg").textContent="This link is incomplete."; return; }
    const {status,data}=await api("/admin/get",{c:slug,k:key});
    if(status!==200||!data.ok){ $("loading").hidden=true; $("loaderr").hidden=false; $("loaderrmsg").textContent=status===401?"This link is wrong or has been reset.":"Couldn't load your leads."; return; }
    bizName=data.business_name||""; $("bizname").textContent=bizName;
    const q="?c="+slug+"&k="+key;
    $("tabFd").href=BASE+"/admin.html"+q; $("tabAp").href=BASE+"/admin.html"+q+"&view=appearance"; $("tabBk").href=BASE+"/booking.html"+q; $("tabLd").href=BASE+"/leads.html"+q; $("tabAn").href=BASE+"/analytics.html"+q;
    $("loading").hidden=true; $("app").style.display="block";
    load();
  })();
</script>
</body>
</html>

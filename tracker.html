<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Invoices · Reception SG</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23171512'/%3E%3Csvg x='5.5' y='5.5' width='21' height='21' viewBox='0 0 64 64'%3E%3Crect x='9' y='45.5' width='46' height='5.8' rx='2.9' fill='%23f3efe8'/%3E%3Cpath d='M15.5 45.5 a16.5 15.5 0 0 1 33 0 Z' fill='%23f3efe8'/%3E%3Ccircle cx='32' cy='26.5' r='3.9' fill='%23e8663a'/%3E%3C/svg%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f3efe8;--card:#fbf8f1;--surface:#ece3d4;--ink:#171512;--muted:#635b4f;--accent:#e8663a;--accent-ink:#b24714;--line:rgba(23,21,18,.13);--font:"Bricolage Grotesque",system-ui,sans-serif;--mono:"Spline Sans Mono",monospace;--ok:#2f7d54;--ok-bg:#e6f0e8}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;padding:26px clamp(14px,4vw,34px) 90px}
  .wrap{max-width:820px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .brand svg{width:24px;height:24px}
  .brand small{font-weight:400;color:var(--muted);font-size:13px;font-family:var(--mono)}
  .newbtn{display:inline-flex;align-items:center;gap:7px;background:var(--accent-ink);color:#fff;text-decoration:none;border-radius:100px;padding:10px 16px;font-weight:600;font-size:14px}
  /* summary */
  .summary{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:26px}
  @media(max-width:560px){.summary{grid-template-columns:1fr 1fr}}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .scard.owe{background:#fbeee6;border-color:rgba(178,71,20,.22)}
  .scard .slabel{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .scard .sval{font-size:clamp(26px,4.5vw,34px);font-weight:800;letter-spacing:-.02em;margin-top:7px;line-height:1}
  .scard.owe .sval{color:var(--accent-ink)}
  .scard .ssub{font-size:12.5px;color:var(--muted);margin-top:6px}
  /* sections */
  .sec{margin-bottom:26px}
  .sechead{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .sechead .n{background:var(--surface);border-radius:100px;padding:1px 8px;font-size:10.5px}
  .row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin-bottom:9px}
  .row.paid{opacity:.72}
  .rmain{flex:1;min-width:0}
  .rclient{font-weight:700;font-size:15.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rmeta{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:3px}
  .ramt{font-weight:700;font-size:15.5px;white-space:nowrap}
  .ractions{display:flex;align-items:center;gap:6px;flex:none}
  .mini{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:8px;padding:7px 11px;font-family:var(--font);font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .mini.pay{background:var(--ok-bg);border-color:rgba(47,125,84,.3);color:var(--ok)}
  .mini.icon{padding:7px 8px;color:var(--muted)}
  .mini.icon svg{width:15px;height:15px}
  .mini:hover{border-color:var(--accent-ink)}
  @media(max-width:560px){
    .row{flex-wrap:wrap}
    .ramt{order:2}
    .ractions{width:100%;order:3;margin-top:2px}
    .ractions .mini{flex:1;justify-content:center}
  }
  .empty{text-align:center;padding:54px 20px;color:var(--muted)}
  .empty h2{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .empty p{font-size:14.5px;margin-top:7px}
  .empty a{color:var(--accent-ink);font-weight:600}
  /* backup bar */
  .backup{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:30px;padding-top:20px;border-top:1px solid var(--line)}
  .backup .bnote{font-size:12px;color:var(--muted);flex:1;min-width:180px;line-height:1.45}
  .backup button{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:100px;padding:9px 15px;font-family:var(--font);font-weight:600;font-size:13px;cursor:pointer}
  .backup button:hover{border-color:var(--accent-ink)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <svg viewBox="0 0 64 64" aria-hidden="true"><rect x="9" y="45.5" width="46" height="5.8" rx="2.9" fill="#171512"/><path d="M15.5 45.5 a16.5 15.5 0 0 1 33 0 Z" fill="#171512"/><circle cx="32" cy="26.5" r="3.9" fill="#e8663a"/></svg>
      Invoices <small>Reception SG</small>
    </div>
    <a class="newbtn" href="invoice.html">+ New invoice</a>
  </div>

  <div class="summary">
    <div class="scard owe">
      <div class="slabel">Outstanding</div>
      <div class="sval" id="oweAmt">S$0</div>
      <div class="ssub" id="oweSub">nothing due</div>
    </div>
    <div class="scard">
      <div class="slabel">Collected</div>
      <div class="sval" id="paidAmt">S$0</div>
      <div class="ssub" id="paidSub">0 paid</div>
    </div>
  </div>

  <div id="lists"></div>

  <div class="backup">
    <span class="bnote">Saved on this device only. Back up now and then so you never lose your records.</span>
    <button id="export">Back up</button>
    <button id="importbtn">Restore</button>
    <input type="file" id="importfile" accept="application/json" style="display:none">
  </div>
</div>

<script>
  var $=function(id){return document.getElementById(id);};
  var LSLIST="receptionInvoiceList";
  function load(){try{return JSON.parse(localStorage.getItem(LSLIST)||'[]');}catch(e){return [];}}
  function save(l){localStorage.setItem(LSLIST,JSON.stringify(l));}
  function money(n){return 'S$'+(+n).toFixed(2).replace(/\.00$/,'');}
  function fmt(v){if(!v)return '';var p=(''+v).split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);try{return d.toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'});}catch(e){return v;}}
  function todayIso(){var d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
  function addMonth(v){if(!v)return '';var p=v.split('-');var e=new Date(+p[0],+p[1]-1,+p[2]);var day=e.getDate();e.setMonth(e.getMonth()+1);if(e.getDate()<day)e.setDate(0);e.setDate(e.getDate()-1);return e.toLocaleDateString('en-SG',{day:'numeric',month:'short'});}
  function esc(s){return (''+s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function setPaid(num,val){var l=load();for(var i=0;i<l.length;i++){if(l[i].num===num){l[i].paid=val;l[i].paidDate=val?todayIso():null;}}save(l);render();}
  function del(num){if(!confirm('Delete '+num+'? This only removes it from this list.'))return;save(load().filter(function(x){return x.num!==num;}));render();}

  function rowHtml(r){
    var period=r.start?(fmt(r.start).replace(/ \d{4}$/,'')+' – '+addMonth(r.start)):'';
    var meta=[r.num,r.client!=='—'&&period?period:period].filter(Boolean).join(' · ');
    var actions=r.paid
      ? '<a class="mini" href="invoice.html?load='+encodeURIComponent(r.num)+'">Receipt</a>'
        +'<button class="mini" data-unpay="'+esc(r.num)+'">Undo</button>'
      : '<button class="mini pay" data-pay="'+esc(r.num)+'">Mark paid</button>'
        +'<a class="mini" href="invoice.html?load='+encodeURIComponent(r.num)+'">Open</a>';
    actions+='<button class="mini icon" data-del="'+esc(r.num)+'" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg></button>';
    return '<div class="row'+(r.paid?' paid':'')+'">'
      +'<div class="rmain"><div class="rclient">'+esc(r.client)+'</div><div class="rmeta">'+esc(meta)+(r.paid&&r.paidDate?' · paid '+fmt(r.paidDate):'')+'</div></div>'
      +'<div class="ramt">'+money(r.amount)+'</div>'
      +'<div class="ractions">'+actions+'</div></div>';
  }

  function render(){
    var l=load().slice().sort(function(a,b){return (b.ts||0)-(a.ts||0);});
    var due=l.filter(function(x){return !x.paid;}), paid=l.filter(function(x){return x.paid;});
    var oweTot=due.reduce(function(s,x){return s+(+x.amount||0);},0);
    var paidTot=paid.reduce(function(s,x){return s+(+x.amount||0);},0);
    $('oweAmt').textContent=money(oweTot);
    $('oweSub').textContent=due.length?(due.length+(due.length===1?' invoice':' invoices')+' unpaid'):'nothing due';
    $('paidAmt').textContent=money(paidTot);
    $('paidSub').textContent=paid.length+(paid.length===1?' paid':' paid');

    if(!l.length){
      $('lists').innerHTML='<div class="empty"><h2>No invoices yet</h2><p>Make your first one in the <a href="invoice.html">invoice maker</a> and it will show up here.</p></div>';
      return;
    }
    var html='';
    if(due.length)html+='<div class="sec"><div class="sechead">Outstanding <span class="n">'+due.length+'</span></div>'+due.map(rowHtml).join('')+'</div>';
    if(paid.length)html+='<div class="sec"><div class="sechead">Paid <span class="n">'+paid.length+'</span></div>'+paid.map(rowHtml).join('')+'</div>';
    $('lists').innerHTML=html;
  }

  document.addEventListener('click',function(e){
    var t=e.target.closest('[data-pay],[data-unpay],[data-del]');if(!t)return;
    if(t.hasAttribute('data-pay'))setPaid(t.getAttribute('data-pay'),true);
    else if(t.hasAttribute('data-unpay'))setPaid(t.getAttribute('data-unpay'),false);
    else if(t.hasAttribute('data-del'))del(t.getAttribute('data-del'));
  });

  // backup / restore
  $('export').addEventListener('click',function(){
    var blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='reception-invoices-backup.json';a.click();
  });
  $('importbtn').addEventListener('click',function(){$('importfile').click();});
  $('importfile').addEventListener('change',function(e){
    var f=e.target.files[0];if(!f)return;var rd=new FileReader();
    rd.onload=function(){try{
      var incoming=JSON.parse(rd.result);if(!Array.isArray(incoming))throw 0;
      var l=load();var byNum={};l.forEach(function(x){byNum[x.num]=x;});
      incoming.forEach(function(x){if(x&&x.num)byNum[x.num]=x;});
      save(Object.keys(byNum).map(function(k){return byNum[k];}));render();
      alert('Restored '+incoming.length+' invoice(s).');
    }catch(err){alert('That file did not look like a Reception backup.');}};
    rd.readAsText(f);
  });

  render();
</script>
</body>
</html>
